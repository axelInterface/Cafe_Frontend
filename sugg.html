<!DOCTYPE html>
<html lang ='en'>
<head>
   <link rel="stylesheet" href="sugg.css">
   <title>Suggestions</title>
</head>
<body>
   <div class="overlay"></div>
    <section>
        <div class="form-box">
            <div class="form-value">
               <center>
               <form class="form">
                Your Name: <input type="text">
                <br>
                <br>
                Your Email (Optional): <input type="text">
                <br>
                <br>
                <br>
                <br>
                <b>Suggestion:</b>
                <br>
                <br>
                <textarea rows="9" cols="80">
                </textarea>
                <br>
                <br>
                <br>
                <button>Submit</button>
                <br>
                <br>
                <br>
                <h2>Your suggestion is very much appreciated!</h2>
                </form></center>
            </div>
        </div>
    </section>
</body>
</html>
